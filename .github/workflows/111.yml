name: Build Conduit iOS3

on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Disable Swift Package Manager + Clean
        run: |
          flutter config --no-enable-swift-package-manager
          rm -rf build/ios
          rm -rf ios/Pods
          rm -f ios/Podfile.lock

      - name: Install dependencies
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Patch connectivity_plus (reliable)
        run: |
          echo "Searching for PathMonitorConnectivityProvider.swift..."
          find ~/.pub-cache -name "PathMonitorConnectivityProvider.swift" -print0 | while IFS= read -r -d '' file; do
            echo "Found: $file"
            sed -i '' 's/isUltraConstrained/isReachable/g' "$file" || true
          done
          echo "Patch finished"

      - name: Pod install
        working-directory: ios
        run: pod install

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Conduit-iOS-Releasable
          path: build/ios/iphoneos/Runner.app
          retention-days: 7
