name: Build Conduit iOS (Flawless Victory)

on: workflow_dispatch

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: '52ab0024e827b784fb40b42659dcc5ee681ef605'

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Wake up daemon & Install iOS 18 SDK
        run: |
          xcrun simctl list > /dev/null
          xcodebuild -downloadPlatform iOS

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      - run: gem install cocoapods

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Clean Workspace
        run: |
          flutter config --no-enable-swift-package-manager
          rm -rf build/ios
          rm -rf ios/Pods
          rm -f ios/Podfile.lock

      - name: Install dependencies
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Patch connectivity_plus
        run: |
          echo "Cleaning and patching connectivity_plus..."
          rm -rf ~/.pub-cache/hosted/pub.dev/connectivity_plus-7.1.1
          flutter pub get
          find ~/.pub-cache -path '*/connectivity_plus-7.1.1/*/PathMonitorConnectivityProvider.swift' -exec sed -i '' \
            's/path\.isUltraConstrained/false/g' {} + || true

      # --- ЭЛЕГАНТНЫЙ ПАТЧ (UI + CarPlay) ---
      - name: Surgical Patch for ALL iOS Code
        run: |
          echo "Patching UI plugins..."
          find ~/.pub-cache/hosted/pub.dev/adaptive_platform_ui-*/ios/Classes -name "*.swift" -exec sed -i '' 's/\.glass()/\.bordered()/g' {} + || true
          find ~/.pub-cache/hosted/pub.dev/adaptive_platform_ui-*/ios/Classes -name "*.swift" -exec sed -i '' 's/\.glass/\.bordered/g' {} + || true
          find ~/.pub-cache/hosted/pub.dev/adaptive_platform_ui-*/ios/Classes -name "*.swift" -exec sed -i '' 's/\.prominentGlass()/\.borderedProminent()/g' {} + || true
          find ~/.pub-cache/hosted/pub.dev/adaptive_platform_ui-*/ios/Classes -name "*.swift" -exec sed -i '' 's/\.prominentGlass/\.borderedProminent/g' {} + || true
          find ~/.pub-cache/hosted/pub.dev/adaptive_platform_ui-*/ios/Classes -name "*.swift" -exec sed -i '' 's/\.prominent/\.done/g' {} + || true

          echo "Patching author's custom Runner code..."
          find ios/Runner -name "*.swift" -exec sed -i '' 's/\.glass()/\.bordered()/g' {} + || true
          find ios/Runner -name "*.swift" -exec sed -i '' 's/\.glass/\.bordered/g' {} + || true
          find ios/Runner -name "*.swift" -exec sed -i '' 's/\.prominentGlass()/\.borderedProminent()/g' {} + || true
          find ios/Runner -name "*.swift" -exec sed -i '' 's/\.prominentGlass/\.borderedProminent/g' {} + || true

          echo "Injecting CarPlay stubs..."
          cat << 'EOF' >> ios/Runner/ConduitCarPlaySceneDelegate.swift
          
          import CarPlay
          extension CPVoiceControlTemplate {
              var backButton: CPBarButton? {
                  get { return nil }
                  set { }
              }
          }
          extension CPVoiceControlState {
              var actionButtons: [CPButton]? {
                  get { return nil }
                  set { }
              }
              static var maximumActionButtonCount: Int { return 3 }
          }
          EOF
      # --------------------------------------

      - name: Pod install
        working-directory: ios
        run: pod install

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Conduit-Unsigned-IPA
          path: build/ios/iphoneos/Runner.app
          retention-days: 7
