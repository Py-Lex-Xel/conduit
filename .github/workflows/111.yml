name: Build Conduit iOS (Tahoe)

on: workflow_dispatch

jobs:
  build:
    # Запрашиваем новейший сервер Apple с поддержкой iOS 26
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          ref: '0657b7b5859e2b6178b3a9ea3f5ca8b74fd53761'

      # Откатываем Ruby до версии 3.2, чтобы CocoaPods не ломался
      - name: Setup Ruby & CocoaPods
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      - run: gem install cocoapods

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Disable Swift Package Manager + Clean
        run: |
          flutter config --no-enable-swift-package-manager
          rm -rf build/ios
          rm -rf ios/Pods
          rm -f ios/Podfile.lock

      - name: Install dependencies
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Patch connectivity_plus
        run: |
          echo "Cleaning and patching connectivity_plus..."
          rm -rf ~/.pub-cache/hosted/pub.dev/connectivity_plus-7.1.1
          flutter pub get
          find ~/.pub-cache -path '*/connectivity_plus-7.1.1/*/PathMonitorConnectivityProvider.swift' -exec sed -i '' \
            's/path\.isUltraConstrained/false/g' {} + || true

      - name: Pod install
        working-directory: ios
        run: pod install

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Conduit-Unsigned-IPA
          path: build/ios/iphoneos/Runner.app
          retention-days: 7
