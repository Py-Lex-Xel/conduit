name: Build Conduit iOS (The Real Deal)

on: workflow_dispatch

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          # Вставь сюда хэш коммита (слепка кода) от 9 июня
          ref: '5bd8cb863fa29f918d3b1a5479d6419b4d47daab'

      # 1. Включаем новейший Xcode
      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      # 2. РАЗГАДКА: Скачиваем SDK iOS 18, которого нет на серверах Гитхаба по умолчанию!
      - name: Install iOS 18 SDK
        run: xcodebuild -downloadPlatform iOS

      # 3. Фиксируем Ruby для CocoaPods
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      - run: gem install cocoapods

      # 4. Включаем стабильный Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Clean Workspace
        run: |
          flutter config --no-enable-swift-package-manager
          rm -rf build/ios
          rm -rf ios/Pods
          rm -f ios/Podfile.lock

      - name: Install dependencies
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      # Патч для connectivity_plus (баг этой библиотеки тянется годами)
      - name: Patch connectivity_plus
        run: |
          echo "Cleaning and patching connectivity_plus..."
          rm -rf ~/.pub-cache/hosted/pub.dev/connectivity_plus-7.1.1
          flutter pub get
          find ~/.pub-cache -path '*/connectivity_plus-7.1.1/*/PathMonitorConnectivityProvider.swift' -exec sed -i '' \
            's/path\.isUltraConstrained/false/g' {} + || true

      - name: Pod install
        working-directory: ios
        run: pod install

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Conduit-Unsigned-IPA
          path: build/ios/iphoneos/Runner.app
          retention-days: 7
