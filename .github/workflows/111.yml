name: Build Conduit iOS2

on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Disable Swift Package Manager + Clean
        run: |
          flutter config --no-enable-swift-package-manager
          rm -rf build/ios
          rm -rf ios/Pods
          rm -f ios/Podfile.lock

      - name: Install dependencies
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Patch connectivity_plus for Xcode 16.4
        run: |
          FILE=$(find ~/.pub-cache/hosted/pub.dev -name "PathMonitorConnectivityProvider.swift" | head -1)
          if [ -f "$FILE" ]; then
            sed -i '' 's/isUltraConstrained/ isReachable/g' "$FILE" || true
            echo "Patched: $FILE"
          fi

      - name: Pod install
        working-directory: ios
        run: pod install

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Conduit-iOS-Releasable
          path: build/ios/iphoneos/Runner.app
          retention-days: 7
