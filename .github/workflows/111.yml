name: Build Conduit iOS4

on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Disable Swift Package Manager + Clean
        run: |
          flutter config --no-enable-swift-package-manager
          rm -rf build/ios
          rm -rf ios/Pods
          rm -f ios/Podfile.lock

      - name: Install dependencies
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Patch connectivity_plus (final)
        run: |
          echo "Patching connectivity_plus..."
          find ~/.pub-cache -name "PathMonitorConnectivityProvider.swift" -exec sed -i '' \
            's/\.isUltraConstrained/false/g; s/\.isReachable/false/g; s/path\.isUltraConstrained/false/g' {} + || true
          echo "Patch completed"

      - name: Pod install
        working-directory: ios
        run: pod install

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Conduit-iOS-Releasable
          path: build/ios/iphoneos/Runner.app
          retention-days: 7
