name: Build Conduit iOS (Final Push)

on: workflow_dispatch

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: '5bd8cb863fa29f918d3b1a5479d6419b4d47daab'

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      # --- ФИКС ОШИБКИ 70 ИЗ ТВОЕГО СКРИНШОТА ---
      - name: Wake up daemon & Install iOS 18 SDK
        run: |
          xcrun simctl list > /dev/null
          xcodebuild -downloadPlatform iOS
      # ------------------------------------------

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      - run: gem install cocoapods

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Clean Workspace
        run: |
          flutter config --no-enable-swift-package-manager
          rm -rf build/ios
          rm -rf ios/Pods
          rm -f ios/Podfile.lock

      - name: Install dependencies
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      # Патчим только сеть, UI больше не блокируем
      - name: Patch connectivity_plus
        run: |
          rm -rf ~/.pub-cache/hosted/pub.dev/connectivity_plus-7.1.1
          flutter pub get
          find ~/.pub-cache -path '*/connectivity_plus-7.1.1/*/PathMonitorConnectivityProvider.swift' -exec sed -i '' \
            's/path\.isUltraConstrained/false/g' {} + || true

      - name: Pod install
        working-directory: ios
        run: pod install

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Conduit-Unsigned-IPA
          path: build/ios/iphoneos/Runner.app
          retention-days: 7
