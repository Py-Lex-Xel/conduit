name: Build Conduit iOS (Re-signable)

on:
  workflow_dispatch:
    inputs:
      flutter_version:
        description: Flutter version
        required: false
        default: '3.24.3'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Фикс ошибки "Unexpected child config found under flutter"
      - name: Fix pubspec.yaml
        run: |
          sed -i '' '/^flutter:/,/^[a-zA-Z]/ {
            /config:/d
          }' pubspec.yaml

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ github.event.inputs.flutter_version }}
          channel: 'stable'
          cache: true

      - name: Flutter pub get + build_runner
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Pod install
        working-directory: ios
        run: pod install

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Create IPA for re-signing
        run: |
          mkdir -p build/ios/ipa
          
          cat > ExportOptions.plist << 'EOL'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOL

          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/Runner.xcarchive \
            clean archive

          xcodebuild -exportArchive \
            -archivePath build/ios/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Conduit-iOS-Releasable
          path: build/ios/ipa/*.ipa
          retention-days: 7
