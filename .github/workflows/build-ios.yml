name: Build Conduit iOS Re-signable

on:
  workflow_dispatch:
    inputs:
      flutter_version:
        description: Flutter version
        required: false
        default: '3.24.3'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # === БЕЗОПАСНЫЙ ФИКС pubspec.yaml ===
      - name: Fix pubspec.yaml (remove invalid flutter.config)
        run: |
          python3 -c '
import yaml
with open("pubspec.yaml", "r", encoding="utf-8") as f:
    data = yaml.safe_load(f) or {}
if isinstance(data.get("flutter"), dict):
    data["flutter"].pop("config", None)
    if not data["flutter"]:
        data.pop("flutter", None)
with open("pubspec.yaml", "w", encoding="utf-8") as f:
    yaml.dump(data, f, sort_keys=False, allow_unicode=True, default_flow_style=False)
print("pubspec.yaml fixed")
'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ github.event.inputs.flutter_version }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Pod install
        working-directory: ios
        run: pod install

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Create re-signable IPA
        run: |
          mkdir -p build/ios/ipa
          cat > ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/Runner.xcarchive \
            clean archive

          xcodebuild -exportArchive \
            -archivePath build/ios/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Conduit-iOS-Releasable
          path: build/ios/ipa/*.ipa
          retention-days: 7
