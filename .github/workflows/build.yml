name: Build iOS Re-signable IPA

on:
  workflow_dispatch:
    inputs:
      flutter_version:
        description: 'Flutter version'
        required: false
        default: '3.24.0'   # попробуй сначала эту

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # === ФИКС НЕВАЛИДНОГО pubspec.yaml ===
      - name: Fix invalid pubspec.yaml (remove flutter.config)
        run: |
          python3 -c '
import yaml, sys
with open("pubspec.yaml", "r", encoding="utf-8") as f:
    data = yaml.safe_load(f) or {}
if "flutter" in data and isinstance(data["flutter"], dict):
    if "config" in data["flutter"]:
        del data["flutter"]["config"]
    if not data["flutter"]:
        del data["flutter"]
with open("pubspec.yaml", "w", encoding="utf-8") as f:
    yaml.dump(data, f, sort_keys=False, allow_unicode=True, default_flow_style=False)
print("pubspec.yaml fixed successfully")
'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ github.event.inputs.flutter_version }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Pod install (iOS)
        working-directory: ios
        run: pod install

      - name: Build iOS release (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Create re-signable IPA
        run: |
          mkdir -p build/ios/ipa
          
          cat > ios/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/Runner.xcarchive \
            clean archive

          xcodebuild -exportArchive \
            -archivePath build/ios/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Conduit-iOS-Releasable
          path: build/ios/ipa/*.ipa
          retention-days: 7
