name: Build Unsigned iOS IPA

on:
workflow_dispatch:

jobs:
build:
runs-on: macos-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Ruby
    uses: ruby/setup-ruby@v1
    with:
      ruby-version: '3.2'

  - name: Install CocoaPods
    run: |
      gem install cocoapods

  - name: Setup Flutter
    uses: subosito/flutter-action@v2
    with:
      channel: stable

  - name: Flutter Doctor
    run: flutter doctor -v

  - name: Get Packages
    run: flutter pub get

  - name: Show Lockfile
    run: cat pubspec.lock

  - name: Find Podspec
    run: |
      find . -name "super_native_extensions.podspec" || true

  - name: Print Podspec
    run: |
      cat ios/.symlinks/plugins/super_native_extensions/ios/super_native_extensions.podspec || true

  - name: Clean
    run: |
      flutter clean
      rm -rf ios/Pods
      rm -rf ios/Podfile.lock

  - name: Pod Install
    run: |
      cd ios
      pod install --verbose

  - name: Build iOS
    run: flutter build ios --release --no-codesign

  - name: Package IPA
    run: |
      mkdir Payload
      cp -R build/ios/iphoneos/Runner.app Payload/
      zip -r Conduit.ipa Payload

  - name: Upload IPA
    uses: actions/upload-artifact@v4
    with:
      name: Conduit-Unsigned-IPA
      path: Conduit.ipa
```
