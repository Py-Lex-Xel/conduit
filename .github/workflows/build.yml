name: Conduit Debug Build

on:
workflow_dispatch:

jobs:
build:
runs-on: macos-15

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Show Repository Info
    run: |
      pwd
      ls -la
      git rev-parse HEAD

  - name: Setup Flutter
    uses: subosito/flutter-action@v2
    with:
      channel: stable

  - name: Flutter Doctor
    run: |
      flutter doctor -v
      flutter --version

  - name: Show pubspec
    run: |
      echo "===== pubspec.yaml ====="
      cat pubspec.yaml

  - name: Install Dependencies
    run: flutter pub get

  - name: Show pubspec.lock
    run: |
      echo "===== pubspec.lock ====="
      cat pubspec.lock

  - name: Locate super_native_extensions
    run: |
      echo "===== FIND RESULTS ====="
      find . -name "*super_native_extensions*" || true

  - name: Dump super_native_extensions podspec
    run: |
      echo "===== PODSPEC WITH LINE NUMBERS ====="
      nl -ba ios/.symlinks/plugins/super_native_extensions/ios/super_native_extensions.podspec || true

  - name: Dump Podfile
    run: |
      echo "===== IOS PODFILE ====="
      cat ios/Podfile || true

  - name: Dump Generated Plugin List
    run: |
      echo "===== GENERATED PLUGIN REGISTRANT ====="
      find ios -name "*GeneratedPluginRegistrant*" -exec cat {} \; || true

  - name: Pod Version Info
    run: |
      ruby --version
      pod --version
      gem list cocoapods

  - name: Run Pod Install Verbose
    run: |
      cd ios
      pod install --verbose
```
